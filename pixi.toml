[workspace]
name = "mojo-uring"
version = "0.0.1"
description = "A high-performance async I/O library for Mojo"
authors = ["Duet LLC <contact@duet.llc>"]
license = "Apache-2.0"
repository = "https://github.com/duet-llc/mojo-uring"
channels = ["https://conda.modular.com/max-nightly/", "conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[dependencies]
mojo = "*"
reuse = "6.2.0.*"

[system-requirements]
linux = "5.1"
