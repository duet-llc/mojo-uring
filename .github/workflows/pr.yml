on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  reuse:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.4
      - run: pixi run reuse lint

  test:
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.4
      - run: pixi run test/run.sh
